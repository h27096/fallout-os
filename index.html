<!DOCTYPE html>
<html>
<head>
    <title>Fallout OS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="boot">
    <h1>FALLOUT OS</h1>
    <p>ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM</p>
    <button onclick="startOS()">START SYSTEM</button>
</div>


<div class="os" id="os">

    <header>
        <h1>FALLOUT OS v2.0</h1>
        <p>VAULT-TEC COMPUTER SYSTEM</p>
    </header>


    <div class="menu">

        <button onclick="openTerminal()">TERMINAL</button>

        <button onclick="showSystem()">SYSTEM</button>

        <button onclick="showVault()">VAULT DATABASE</button>

    </div>


    <div id="screen">
        Welcome to Fallout OS.
    </div>


</div>


<script src="script.js"></script>

</body>
</html>
