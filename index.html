<!DOCTYPE html>
<html>
<head>
    <title>Fallout OS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="terminalScreen" class="terminalWindow">

<h1>FALLOUT OS</h1>

<p>ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM</p>

<button onclick="boot()">START SYSTEM</button>

<div id="screen">
    <span id="output"></span><span id="cursor">_</span>
</div>

<br>

<input id="command" placeholder="ENTER COMMAND" disabled>

<button id="executeButton" onclick="runCommand()" disabled>
    EXECUTE
</button>

      </div>

    <div id="desktopScreen" style="display:none;">

    <h1>ROBCO INDUSTRIES DESKTOP</h1>

    <div id="desktopIcons">

        <button onclick="launchBrowser()">
            VAULTNET
        </button>

        <button>
            SECURITY
        </button>

        <button>
            REACTOR
        </button>

        <button>
            PERSONNEL
        </button>

        <button>
            LOGS
        </button>

        <button>
            SETTINGS
        </button>

    </div>

</div>

<div id="browserScreen" style="display:none;">

    <h1>ROBCO VAULTNET BROWSER</h1>

    <div id="browserOutput">
        WELCOME TO VAULTNET
    </div>

    <br>

<input id="browserCommand" placeholder="ENTER ADDRESS">

<button onclick="browserCommand()">
    GO
</button>
    
</div>

<script src="script.js"></script>

</body>
</html>
